name: update-alertmanager-secret

on:
  workflow_dispatch:

jobs:
  update-secret:
    runs-on: ubuntu-latest

    steps:
      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 --decode > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Create or update Alertmanager config secret
        run: |
          cat > alertmanager.yaml <<EOF
          global:
            resolve_timeout: 5m

          route:
            receiver: telegram
            group_wait: 10s
            group_interval: 30s
            repeat_interval: 1h

          receivers:
            - name: telegram
              telegram_configs:
                - bot_token: "${{ secrets.TELEGRAM_BOT_TOKEN }}"
                  chat_id: ${{ secrets.TELEGRAM_CHAT_ID }}
                  send_resolved: true
          EOF

          kubectl create secret generic alertmanager-telegram-config \
            -n monitoring \
            --from-file=alertmanager.yaml=alertmanager.yaml \
            --dry-run=client -o yaml | kubectl apply -f -