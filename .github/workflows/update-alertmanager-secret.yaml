name: update-alertmanager-secret

on:
  workflow_dispatch:

jobs:
  update-secret:
    runs-on: [self-hosted, local-k3d]

    steps:
      - name: Checkout ops repo
        uses: actions/checkout@v4

      - name: Check cluster access
        run: |
          kubectl cluster-info
          kubectl get ns

      - name: Create or update Alertmanager config secret
        run: |
          cat > alertmanager.yaml <<EOF
          global:
            resolve_timeout: 5m

          route:
            receiver: telegram
            group_by: ['alertname']
            group_wait: 10s
            group_interval: 30s
            repeat_interval: 5m

          receivers:
            - name: telegram
              telegram_configs:
                - bot_token: "${{ secrets.TELEGRAM_BOT_TOKEN }}"
                  chat_id: ${{ secrets.TELEGRAM_CHAT_ID }}
                  send_resolved: true
                  parse_mode: ""
                  message: '{{ template "telegram.simple" . }}'

          templates:
            - /etc/alertmanager/config/*.tmpl
          EOF

          cat > telegram.tmpl <<EOF
          {{ define "telegram.simple" -}}
          {{- if gt (len .Alerts.Firing) 0 }}FIRING{{ end -}}
          {{- if gt (len .Alerts.Resolved) 0 }} RESOLVED{{ end }}
          alert={{ .CommonLabels.alertname }}
          severity={{ .CommonLabels.severity }}
          {{- if .CommonAnnotations.summary }}
          summary={{ .CommonAnnotations.summary }}
          {{- end }}
          {{- end }}
          EOF

          kubectl create secret generic alertmanager-telegram-config \
            -n monitoring \
            --from-file=alertmanager.yaml=alertmanager.yaml \
            --from-file=telegram.tmpl=telegram.tmpl \
            --dry-run=client -o yaml | kubectl apply -f -