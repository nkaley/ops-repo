apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: vault
  namespace: monitoring
  labels:
    release: monitoring
spec:
  namespaceSelector:
    matchNames:
      - vault
  selector:
    matchLabels:
      app.kubernetes.io/instance: vault
  endpoints:
    - port: http
      path: /v1/sys/metrics
      interval: 30s

      params:
        format:
          - prometheus

      scheme: http

      authorization:
        type: Bearer
        credentials:
          name: vault-metrics-token
          key: token