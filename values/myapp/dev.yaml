replicaCount: 1

image:
  repository: ghcr.io/nkaley/app-repo
  tag: sha-18d5f26
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  className: nginx
  host: myapp.local
  path: /
  pathType: Prefix

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi

env:
  HTTP_PORT: "8080"

  LOG_LEVEL: "info"
  SHUTDOWN_TIMEOUT: "10s"
  DB_TIMEOUT: "2s"
  DB_MAX_CONNS: "20"
  DB_MAX_IDLE: "5"

  REDIS_ADDR: "redis-master:6379"
  REDIS_PASSWORD: ""
  REDIS_DB: "0"
  REDIS_TIMEOUT: "2s"

  CACHE_TTL: "45s"

  STARTUP_RETRIES: "20"
  STARTUP_RETRY_GAP: "2s"

probes:
  liveness:
    path: /healthz
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3
  readiness:
    path: /readyz
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 3
  startup:
    path: /readyz
    periodSeconds: 2
    timeoutSeconds: 2
    failureThreshold: 30

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      percent: 100
      periodSeconds: 15
    scaleDown:
      stabilizationWindowSeconds: 120
      percent: 50
      periodSeconds: 60